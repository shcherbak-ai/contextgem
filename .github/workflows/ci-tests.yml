name: tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:

  package-check:
    # Pure-Python build: one runner is sufficient — sdist + wheel are
    # platform- and Python-version-independent.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build and validate distribution
        run: uv run python dev/check_package.py

  tests-with-vcr:

    strategy:
      matrix:
        os: [ "ubuntu-latest" ]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    defaults:
      run:
        shell: bash

    runs-on: ${{ matrix.os }}

    steps:

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      
      - name: Install dependencies
        run: uv sync --all-groups

      - name: Code formatting and linting checks
        run: |
          uv run ruff check contextgem dev tests
          uv run ruff format --check contextgem dev tests

      - name: Type checking
        run: |
          uv run ty check

      - name: Security check (bandit)
        run: |
          uv run bandit -r contextgem
          uv run bandit -r tests dev --skip B101

      - name: Dependency health check
        run: |
          uv run deptry .

      - name: Docstring coverage check
        run: |
          uv run interrogate

      - name: Run coverage (with VCR)
        run: |
          uv run coverage run --source contextgem -m pytest --maxfail=1 --disable-warnings -v
          uv run coverage report -m
          uv run coverage xml -o coverage_quick.xml

      - name: Extract coverage
        id: get_coverage
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; print(round(float(ET.parse('coverage_quick.xml').getroot().attrib['line-rate'])*100))")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          # Determine badge color based on coverage percentage
          if [ $COVERAGE -ge 80 ]; then
            echo "color=success" >> $GITHUB_OUTPUT
          elif [ $COVERAGE -ge 60 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=critical" >> $GITHUB_OUTPUT
          fi
          
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-data
          path: |
            coverage_quick.xml
          retention-days: 1

  update-badge:
    needs: tests-with-vcr
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-data
          
      - name: Extract coverage
        id: get_coverage
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; print(round(float(ET.parse('coverage_quick.xml').getroot().attrib['line-rate'])*100))")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          # Determine badge color based on coverage percentage
          if [ $COVERAGE -ge 80 ]; then
            echo "color=success" >> $GITHUB_OUTPUT
          elif [ $COVERAGE -ge 60 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=critical" >> $GITHUB_OUTPUT
          fi
          
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501  # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: daaee00e1dfff7a29ca10a922ec3becd
          filename: coverage.json
          label: coverage
          message: ${{ steps.get_coverage.outputs.percentage }}%
          color: ${{ steps.get_coverage.outputs.color }}
