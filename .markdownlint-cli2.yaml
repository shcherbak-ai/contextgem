# Signed contributor agreements live verbatim — do not lint or auto-fix.
ignores:
  - ".github/contributors/**"

config:
  no-duplicate-heading:
    siblings_only: true
  line-length: false
  first-line-heading: false
  table-column-style: false
  no-inline-html:
    allowed_elements:
      - a
      - br
      - div
      - h1
      - i
      - img
      - p
      - strong
      - sub
      - sup
      - table
      - tbody
      - td
      - th
      - thead
      - tr
